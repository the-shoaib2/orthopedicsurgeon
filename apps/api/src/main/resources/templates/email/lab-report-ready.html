<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .header {
            background-color: #17a2b8;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }

        .content {
            padding: 30px;
        }

        .footer {
            text-align: center;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>Lab Report Ready</h2>
        </div>
        <div class="content">
            <p>Dear <span th:text="${patientName}">Patient</span>,</p>
            <p>A new lab report has been uploaded to your patient portal.</p>
            <p><strong>Report:</strong> <span th:text="${reportName}">Report</span></p>
            <p>You can view and download your report by logging into your account.</p>
            <p style="text-align: center;">
                <a href="http://localhost:4200/portal/lab-reports"
                    style="display: inline-block; padding: 10px 20px; background-color: #17a2b8; color: white; text-decoration: none; border-radius: 5px;">View
                    Reports</a>
            </p>
        </div>
        <div class="footer">
            &copy; 2026 Orthopedic Surgeon Platform. All rights reserved.
        </div>
    </div>
</body>

</html>
