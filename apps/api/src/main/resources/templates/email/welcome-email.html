<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .header { background-color: #007bff; color: white; padding: 10px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 20px; }
        .footer { text-align: center; font-size: 0.8em; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to Orthopedic Platform</h1>
        </div>
        <div class="content">
            <p>Dear <span th:text="${name}">User</span>,</p>
            <p>Welcome to our platform! We are excited to have you on board.</p>
            <p>Your account has been successfully created. You can now log in and book appointments, view your reports, and more.</p>
            <p><a href="http://localhost:4200/login" style="display: inline-block; padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px;">Login Now</a></p>
        </div>
        <div class="footer">
            &copy; 2026 Orthopedic Surgeon Platform. All rights reserved.
        </div>
    </div>
</body>
</html>
