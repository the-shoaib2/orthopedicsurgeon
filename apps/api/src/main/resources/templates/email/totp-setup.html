<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .header {
            background-color: #343a40;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }

        .content {
            padding: 30px;
        }

        .code {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 5px;
            text-align: center;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 4px;
            border: 1px dashed #ced4da;
        }

        .footer {
            text-align: center;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>Two-Factor Authentication Setup</h2>
        </div>
        <div class="content">
            <p>Hello <span th:text="${name}">User</span>,</p>
            <p>You are setting up Two-Factor Authentication (2FA) for your account.</p>
            <p>Your verification code is:</p>
            <div class="code" th:text="${code}">123456</div>
            <p>If you did not initiate this, please contact support immediately.</p>
        </div>
        <div class="footer">
            &copy; 2026 Orthopedic Surgeon Platform. All rights reserved.
        </div>
    </div>
</body>

</html>
