<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .header {
            background-color: #6610f2;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }

        .content {
            padding: 30px;
        }

        .footer {
            text-align: center;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>New Prescription Available</h2>
        </div>
        <div class="content">
            <p>Dear <span th:text="${patientName}">Patient</span>,</p>
            <p>Dr. <span th:text="${doctorName}">Doctor</span> has issued a new prescription for you.</p>
            <p>You can view the details and download the prescription from your patient portal.</p>
            <p style="text-align: center;">
                <a href="http://localhost:4200/portal/prescriptions"
                    style="display: inline-block; padding: 10px 20px; background-color: #6610f2; color: white; text-decoration: none; border-radius: 5px;">View
                    Prescription</a>
            </p>
        </div>
        <div class="footer">
            &copy; 2026 Orthopedic Surgeon Platform. All rights reserved.
        </div>
    </div>
</body>

</html>
