management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true

spring:
  flyway:
    clean-on-validation-error: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orthopedic_db}
    username: ${SPRING_DATASOURCE_USERNAME:shoaib}
    password: ${SPRING_DATASOURCE_PASSWORD:shoaib123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: OrthopedicHikariPool
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
  cache:
    type: redis
    redis:
      time-to-live: 3600000
  data:
    redis:
      host: localhost
      port: 6379
  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 100
        keep-alive: 60s
      thread-name-prefix: ortho-async-
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:admin@orthosync.com}
    password: ${SMTP_PASS:password}
    from: ${SMTP_FROM:admin@orthosync.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: "*"
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

twilio:
  account-sid: ${TWILIO_SID:your_sid}
  auth-token: ${TWILIO_AUTH_TOKEN:your_token}
  from-number: ${TWILIO_FROM:+1234567890}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:orthopedic-bucket}

aws:
  s3:
    bucket: ${S3_BUCKET:ortho-reports}

logging:
  level:
    root: INFO
    "[com.orthopedic.api]": DEBUG
    org.springframework.security: INFO
    org.zalando.logbook: TRACE
